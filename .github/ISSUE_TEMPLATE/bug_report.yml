name: Bug report
description: Report a defect in Henchmen so we can fix it
title: "[bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below
        so we can reproduce and fix the issue quickly.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug.
      placeholder: |
        1. Run `...`
        2. Dispatch task `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: input
    id: henchmen-version
    attributes:
      label: Henchmen version
      description: Run `pip show henchmen | grep Version` and paste the result.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.4"
    validations:
      required: true
  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM provider
      options:
        - openai
        - anthropic
        - vertex
        - ollama
        - other
    validations:
      required: true
  - type: dropdown
    id: provider-mode
    attributes:
      label: Provider mode
      options:
        - gcp
        - aws
        - local
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      description: Paste any relevant logs. They will be rendered as a code block.
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Relevant .env snippet
      description: Paste only the relevant keys. REDACT ALL SECRETS before submitting.
      render: dotenv
