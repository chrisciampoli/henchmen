name: Evals

# Manually-triggered workflow for running the Henchmen eval harness
# against one LLM provider and opening a pull request with the updated
# evals/baseline.json. This is how the maintainer and community
# contributors populate per-provider parity numbers without the main CI
# having to burn LLM credits on every push.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider to evaluate"
        required: true
        type: choice
        options:
          - openai
          - anthropic
          - vertex
          - ollama
      fixture:
        description: "Fixture to run (leave blank for --all)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.provider }}
  cancel-in-progress: true

jobs:
  run-eval:
    name: Run eval (${{ github.event.inputs.provider }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (local + dev)
        run: pip install -e ".[local,dev]"

      - name: Run eval
        env:
          HENCHMEN_OPENAI_API_KEY: ${{ secrets.HENCHMEN_OPENAI_API_KEY }}
          HENCHMEN_ANTHROPIC_API_KEY: ${{ secrets.HENCHMEN_ANTHROPIC_API_KEY }}
          HENCHMEN_GCP_PROJECT_ID: ${{ secrets.HENCHMEN_GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          PROVIDER="${{ github.event.inputs.provider }}"
          FIXTURE="${{ github.event.inputs.fixture }}"

          # Write the GCP credentials file if a vertex run was requested.
          if [ "$PROVIDER" = "vertex" ] && [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          fi

          if [ -z "$FIXTURE" ]; then
            henchmen eval --provider "$PROVIDER" --all --write-baseline
          else
            henchmen eval --provider "$PROVIDER" --fixture "$FIXTURE" --write-baseline
          fi

      - name: Show diff
        run: git diff --stat evals/baseline.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          branch: "evals/update-${{ github.event.inputs.provider }}"
          title: "evals: refresh ${{ github.event.inputs.provider }} baseline"
          body: |
            Automated PR from the `evals.yml` workflow. Ran the eval harness for the
            **${{ github.event.inputs.provider }}** provider and is proposing the updated
            `evals/baseline.json` for review.

            ### Trigger
            - Provider: `${{ github.event.inputs.provider }}`
            - Fixture: `${{ github.event.inputs.fixture || 'all' }}`
            - Actor: @${{ github.actor }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Review checklist
            - [ ] Numbers look sane (no NaN / null scores)
            - [ ] No secrets leaked into the diff
            - [ ] `last_updated` timestamp is today
          commit-message: "evals: refresh ${{ github.event.inputs.provider }} baseline"
          add-paths: |
            evals/baseline.json
