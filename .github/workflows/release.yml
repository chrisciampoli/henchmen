name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import henchmen; print('import ok')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: dist/*
          prerelease: ${{ contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GHCR container images — build all 4 service containers and push
      # them to ghcr.io so self-hosters can pull without Artifact Registry.
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          REPO="ghcr.io/${{ github.repository }}"
          for svc in dispatch mastermind forge operative; do
            docker build -f containers/${svc}/Dockerfile \
              -t "${REPO}/${svc}:${TAG}" \
              -t "${REPO}/${svc}:latest" .
            docker push "${REPO}/${svc}:${TAG}"
            docker push "${REPO}/${svc}:latest"
          done
