name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new push arrives to the same ref.
# Saves CI minutes and prevents stale-branch races on :latest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (lint tooling only)
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (full stack — mypy needs cloud SDKs to type-check imports)
        run: pip install -e ".[dev-integration]"

      - name: mypy
        run: mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev-integration]"

      - name: pytest (unit only — fast loop)
        env:
          HENCHMEN_PROVIDER: local
          HENCHMEN_GCP_PROJECT_ID: test-project
        run: pytest tests/unit/ -v --tb=short -m "not integration"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (full stack — integration suite imports google.cloud.*)
        run: pip install -e ".[dev-integration]"

      - name: pytest (integration suite)
        env:
          HENCHMEN_PROVIDER: local
          HENCHMEN_GCP_PROJECT_ID: test-project
          HENCHMEN_ENVIRONMENT: dev
        run: pytest tests/integration/ -v --tb=short

  docker-compose-smoke:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create minimal .env.local
        run: |
          cat > .env.local <<'EOF'
          HENCHMEN_PROVIDER=local
          HENCHMEN_ENVIRONMENT=dev
          HENCHMEN_GCP_PROJECT_ID=test-project
          HENCHMEN_LLM_OLLAMA_SKIP_PROBE=1
          EOF

      # The real `ollama` image is ~2GB and would bloat CI. The compose
      # file depends on Ollama being healthy, so stub it out with a
      # tiny HTTP server that returns 200 on any path. This verifies
      # the rest of the stack can start, wire env vars, and hit its
      # health endpoints without pulling the full model server.
      - name: Stub Ollama image (tiny HTTP 200 responder)
        run: |
          mkdir -p ci/stub-ollama
          cat > ci/stub-ollama/Dockerfile <<'EOF'
          FROM python:3.12-alpine
          RUN printf 'from http.server import BaseHTTPRequestHandler, HTTPServer\nclass H(BaseHTTPRequestHandler):\n    def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b"[]")\n    def do_POST(self): self.send_response(200); self.end_headers(); self.wfile.write(b"{}")\n    def log_message(self, *a): pass\nHTTPServer(("0.0.0.0", 11434), H).serve_forever()\n' > /srv.py
          EXPOSE 11434
          CMD ["python", "/srv.py"]
          EOF
          docker build -t ollama/ollama:0.4.6 ci/stub-ollama

      - name: docker compose up -d
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 120))
          while [ $SECONDS -lt $deadline ]; do
            state=$(docker compose ps --format '{{.Service}} {{.Status}}')
            echo "[smoke] $state"
            if ! echo "$state" | grep -E '(starting|unhealthy)'; then
              if echo "$state" | grep -q 'healthy'; then
                echo "[smoke] all services report healthy"
                exit 0
              fi
            fi
            sleep 5
          done
          echo "[smoke] timed out waiting for healthy status"
          docker compose ps
          docker compose logs --tail=50
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: docker compose down
        if: always()
        run: docker compose down --volumes --remove-orphans
