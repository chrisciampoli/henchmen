    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    assignees:
      - chrisciampoli
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /containers/operative
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    assignees:
      - chrisciampoli
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
